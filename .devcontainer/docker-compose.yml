services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces:cached
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=p
      - DB_NAME=ATM
    depends_on:
      - db
    command: /bin/sh -c "while sleep 1000; do :; done"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: p
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: ATM
    ports:
      # If 3307 is taken, set ATM_HOST_DB_PORT=3308 in a `.env` in the repo root before `docker compose up`.
      - "${ATM_HOST_DB_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
      # First-time MySQL volume only: creates table + seed rows (see schema.sql)
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  db-data:
  