name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmysqlcppconn-dev \
            libgtest-dev \
            libgmock-dev \
            lcov \
            doxygen \
            graphviz \
            clang-format \
            cppcheck \
            cmake \
            build-essential \
            bc
          sudo cmake -S /usr/src/googletest -B /tmp/gtest-build
          sudo cmake --build /tmp/gtest-build
          sudo cmake --install /tmp/gtest-build
          sudo rm -rf /tmp/gtest-build

      - name: Run build pipeline
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: documentation
          path: docs/html/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: coverage/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: test-results
          path: build/debug/test_results.xml
